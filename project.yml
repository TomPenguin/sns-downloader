name: SNSDownloader
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM はコミットしない。Xcode の Signing & Capabilities で
    # 各自の Team を設定するか、下の行を自分のチーム ID で復活させる。
    # DEVELOPMENT_TEAM: XXXXXXXXXX
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  SNSDownloader:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.karabiner.mochi.snsdownloader
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: SNS Downloader
        CFBundleShortVersionString: "1.0.2"
        CFBundleVersion: "3"
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: ダウンロードした画像・動画を写真ライブラリに保存するために使用します。
        CFBundleURLTypes:
          - CFBundleURLName: tech.karabiner.mochi.snsdownloader
            CFBundleURLSchemes:
              - snsdl
    entitlements:
      path: App/App.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)tech.karabiner.mochi.snsdownloader
    dependencies:
      - target: ShareExtension
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.karabiner.mochi.snsdownloader.share
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: SNSに保存
        CFBundleShortVersionString: "1.0.2"
        CFBundleVersion: "3"
        NSPhotoLibraryAddUsageDescription: ダウンロードした画像・動画を写真ライブラリに保存するために使用します。
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)tech.karabiner.mochi.snsdownloader
